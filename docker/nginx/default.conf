# WebSocket upgrade plumbing (valid here: this file is included inside http{}).
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Port 80 serves the midi-maze-js game (SPA) and proxies ONLY the two orchestrator
# endpoints the browser app actually uses:
#   /ws     -> orchestrator WebSocket carrier  (127.0.0.1:5006)  [WS upgrades only]
#   /rooms  -> orchestrator rooms REST          (127.0.0.1:8080)
# The orchestrator's own operator UI (its "/" status/ring screen, /lobby,
# /status.json) is deliberately NOT exposed on :80 — reach it directly on :8080.
# The direct ports (5005/5006/8080) remain published too (D-16).
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # --- Game WebSocket carrier: WS upgrades only ---
    # A plain (non-Upgrade) GET to /ws returns 426 instead of leaking the
    # orchestrator's HTML status screen.
    location = /ws {
        if ($http_upgrade = "") { return 426; }
        proxy_pass http://127.0.0.1:5006/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # --- Rooms REST (list / create / delete) — the only orchestrator HTTP the app needs ---
    location = /rooms {
        proxy_pass http://127.0.0.1:8080/rooms;
        proxy_set_header Host $host;
    }
    location ^~ /rooms/ {
        proxy_pass http://127.0.0.1:8080/rooms/;
        proxy_set_header Host $host;
    }

    # --- Everything else is the static game app (SPA fallback) ---
    location / {
        try_files $uri $uri/ /index.html;
    }
}
