# Serve the midi-maze-js static app on :80. The app talks to the orchestrator
# directly on :5006 (WebSocket) and :8080 (HTTP/REST) — no proxy here (D-16).
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
